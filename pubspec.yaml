name: uncle_john
description: Uncle John - Because Uncle John cares about what you eat.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.12.0+1
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.1.2
  crop_your_image: ^1.1.0
  path_provider: ^2.1.4
  http: ^1.2.2
  share_plus: ^13.0.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/